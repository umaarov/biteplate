name: biteplate

x-app-env: &app-env
  APP_ENV: local
  APP_DEBUG: "false"
  APP_URL: http://localhost:8000
  LOG_CHANNEL: stderr
  DB_CONNECTION: pgsql
  DB_HOST: db
  DB_PORT: "5432"
  DB_DATABASE: biteplate
  DB_USERNAME: biteplate
  DB_PASSWORD: secret
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  BITEPLATE_BRANCH: coastal
  BITEPLATE_DEV_LOGIN: "true"
  # Kafka
  KAFKA_ENABLED: "true"
  KAFKA_BROKERS: kafka:9092
  KAFKA_TOPIC: biteplate.events
  KAFKA_GROUP: biteplate-consumers
  # Keycloak (OIDC). Browser SSO additionally needs `127.0.0.1 keycloak` in your hosts file.
  KEYCLOAK_BASE_URL: http://keycloak:8080
  KEYCLOAK_REALM: biteplate
  KEYCLOAK_CLIENT_ID: biteplate-pos
  KEYCLOAK_CLIENT_SECRET: biteplate-pos-secret
  KEYCLOAK_REDIRECT_URI: http://localhost:8000/auth/keycloak/callback
  # OpenLDAP (LdapRecord)
  LDAP_CONNECTION: default
  LDAP_HOST: openldap
  LDAP_PORT: "1389"
  LDAP_BASE_DN: dc=biteplate,dc=local
  LDAP_USERNAME: cn=admin,dc=biteplate,dc=local
  LDAP_PASSWORD: adminpassword

services:
  app:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    env_file: .env
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
      kafka: { condition: service_started }
    restart: unless-stopped

  kafka-consumer:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    env_file: .env
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "biteplate:kafka:consume"]
    depends_on:
      kafka: { condition: service_started }
      app: { condition: service_started }
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    env_file: .env
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      app: { condition: service_started }
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: biteplate
      POSTGRES_USER: biteplate
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biteplate"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafkadata:/bitnami/kafka
    ports:
      - "9092:9092"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      openldap: { condition: service_started }
    ports:
      - "8080:8080"

  openldap:
    image: bitnami/openldap:2.6
    environment:
      LDAP_ROOT: dc=biteplate,dc=local
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
      LDAP_SKIP_DEFAULT_TREE: "yes"
      LDAP_CUSTOM_LDIF_DIR: /ldifs
    volumes:
      - ./docker/ldap:/ldifs:ro
      - ldapdata:/bitnami/openldap
    ports:
      - "1389:1389"

volumes:
  pgdata:
  kafkadata:
  ldapdata:
